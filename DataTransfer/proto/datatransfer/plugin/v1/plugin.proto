syntax = "proto3";

package datatransfer.plugin.v1;

import "proto/datatransfer/v1/datatransfer.proto";

option go_package = "competition2026/product/datatransfer/gen/datatransfer/plugin/v1;pluginv1";

message InitRequest {
  string connector_id = 1;
  string protocol = 2;
  bytes config_json = 3;
}

message InitResponse {
  bool success = 1;
  string error_message = 2;
}

message StartRequest {
  string connector_id = 1;
}

message StopRequest {
  string connector_id = 1;
}

message ReloadConfigRequest {
  string connector_id = 1;
  bytes config_json = 2;
}

message CommandRequest {
  datatransfer.v1.DeviceMessage command = 1;
}

message StatusRequest {
  string connector_id = 1;
}

message ConnectorStatusResponse {
  string connector_id = 1;
  string protocol = 2;
  string state = 3;
  int32 device_count = 4;
  string error_message = 5;
  int64 uptime = 6;
}

message EmptyResponse {}

service SidecarConnectorService {
  rpc Init(InitRequest) returns (InitResponse);
  rpc Start(StartRequest) returns (stream datatransfer.v1.DeviceMessage);
  rpc SendCommand(CommandRequest) returns (datatransfer.v1.CommandResponsePayload);
  rpc ReloadConfig(ReloadConfigRequest) returns (InitResponse);
  rpc GetStatus(StatusRequest) returns (ConnectorStatusResponse);
  rpc Stop(StopRequest) returns (EmptyResponse);
}
